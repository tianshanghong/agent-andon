<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Andon">
<meta name="theme-color" content="#0c0d10">
<link rel="manifest" href="/manifest.webmanifest">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="apple-touch-icon" href="/favicon.svg">
<title>Agent Andon</title>

<!-- IBM Plex = engineer's grotesk + mono, same superfamily; SC covers 中文.
     Graceful fallback if the board is offline. -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@500;600;700&family=IBM+Plex+Sans+SC:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  :root{
    --bg:#0c0d10; --surface:#15171c; --hairline:#23262e; --hairline-soft:#1b1e25;
    --text:#e7eaef; --muted:#878e9b; --faint:#565d69;

    /* signal lenses — physical stack-light colour, flat. the colour IS the state. */
    --c-working:#5478c4;   /* steel blue — running, leave it alone (stays calm) */
    --c-waiting:#ffaa1a;   /* amber — your move; bright for across-the-room read */
    --c-done:#3aa86b;      /* green lens — finished cleanly       */
    --c-error:#ff463b;     /* signal red — blocked / stuck; bright + alarming   */
    --c-idle:#3b424d;      /* slate      — nothing running        */
    --c-offline:#6b4a46;   /* brick      — board lost the Mac     */

    --mono:'IBM Plex Mono',ui-monospace,'SF Mono',Menlo,monospace;
    --sans:'IBM Plex Sans','IBM Plex Sans SC',-apple-system,system-ui,'PingFang SC',sans-serif;
    --ease:cubic-bezier(.2,.7,.1,1);

    --dom:var(--c-idle); --bar-ink:#c8cdd6;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--bg);color:var(--text);font-family:var(--sans);
    -webkit-font-smoothing:antialiased;overflow:hidden;
    transition:background-color .35s var(--ease);
  }
  body[data-dominant="working"]{--dom:var(--c-working);--bar-ink:#eaf0fb;background:#0b0d12}
  body[data-dominant="waiting"]{--dom:var(--c-waiting);--bar-ink:#1c1404;background:#100d07}
  body[data-dominant="done"]   {--dom:var(--c-done);   --bar-ink:#04140b;background:#0a110d}
  body[data-dominant="error"]  {--dom:var(--c-error);  --bar-ink:#fdeceb;background:#120b0b}
  body[data-dominant="idle"]   {--dom:var(--c-idle);   --bar-ink:#c8cdd6}
  body[data-dominant="offline"]{--dom:var(--c-offline);--bar-ink:#f0dedb;background:#110b0a}

  /* faint engineer's grid — texture for depth, not a glow wash */
  .grid{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.45;
    background-image:
      linear-gradient(var(--hairline-soft) 1px,transparent 1px),
      linear-gradient(90deg,var(--hairline-soft) 1px,transparent 1px);
    background-size:38px 38px;
    -webkit-mask-image:radial-gradient(135% 100% at 50% -8%,#000,transparent 72%);
            mask-image:radial-gradient(135% 100% at 50% -8%,#000,transparent 72%)}

  /* SIGNATURE: one flat band of the dominant colour. it answers ONE question —
     does anything need me? — across the room. the cards never move; this counts. */
  .andon{position:fixed;left:0;right:0;top:0;z-index:6;height:48px;
    display:flex;align-items:center;gap:14px;padding:0 26px;
    background:var(--dom);color:var(--bar-ink);
    font-family:var(--mono);font-size:13px;letter-spacing:.04em;
    transition:background-color .35s var(--ease),color .35s var(--ease)}
  .andon-dot{width:9px;height:9px;border-radius:1px;background:var(--bar-ink);flex:none}
  .andon-word{font-weight:700;letter-spacing:.16em}
  .andon-cn{opacity:.72;font-family:var(--sans);font-weight:500;letter-spacing:.02em}
  .andon-tally{margin-left:auto;opacity:.78;font-variant-numeric:tabular-nums;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  body[data-dominant="waiting"] .andon-dot{animation:blink 1.4s steps(1,end) infinite}
  body[data-dominant="error"]   .andon-dot{animation:blink .8s  steps(1,end) infinite}
  @keyframes blink{0%,55%{opacity:1}55.01%,100%{opacity:.18}}
  /* the whole top band pulses when something needs you — a room-wide beacon */
  body[data-dominant="waiting"] .andon{animation:barBeat 1.6s ease-in-out infinite}
  body[data-dominant="error"]   .andon{animation:barBeat .9s  ease-in-out infinite}
  @keyframes barBeat{0%,100%{filter:brightness(1)}50%{filter:brightness(1.18)}}

  /* ───────── layout ───────── */
  .app{position:relative;z-index:2;height:100%;display:flex;flex-direction:column;
    padding:72px 44px 28px}
  .head{display:flex;align-items:center;gap:18px;font-family:var(--mono);
    font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted)}
  .brand{color:var(--text);font-weight:600;letter-spacing:.30em}
  .head .rule{flex:1;height:1px;background:var(--hairline)}
  .conn{display:flex;align-items:center;gap:8px}
  .conn .led{width:8px;height:8px;border-radius:1px;background:var(--c-done);transition:background-color .3s}
  .conn.off .led{background:var(--c-error)}
  .clock{font-variant-numeric:tabular-nums;color:var(--text);letter-spacing:.1em}
  .btn{font:inherit;font-family:var(--mono);color:var(--muted);background:transparent;
    border:1px solid var(--hairline);border-radius:4px;padding:7px 13px;letter-spacing:.1em;
    text-transform:uppercase;cursor:pointer;-webkit-tap-highlight-color:transparent;
    transition:color .3s,border-color .3s}
  .btn:hover{color:var(--text);border-color:var(--faint)}
  .btn.on{color:var(--c-done);border-color:rgba(58,168,107,.5)}
  /* sound toggle: text on the desktop/wall board, a compact icon on phones (so
     the header is one row in every language). The icon follows currentColor. */
  .btn.sound{display:inline-flex;align-items:center;gap:7px}
  .sico{display:none;align-items:center}
  .sico svg{display:block}
  /* language picker: a native <select> (scales to any number of languages — the
     iPad shows a scrollable OS picker). Styled to match the .btn chrome. */
  .langsel{font:inherit;font-family:var(--mono);font-size:13px;color:var(--muted);
    background:transparent;border:1px solid var(--hairline);border-radius:4px;
    padding:7px 30px 7px 12px;cursor:pointer;letter-spacing:.04em;color-scheme:dark;
    -webkit-appearance:none;appearance:none;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path d='M1 1l4 4 4-4' fill='none' stroke='%237a818c' stroke-width='1.4'/></svg>");
    background-repeat:no-repeat;background-position:right 11px center}
  .langsel:hover{color:var(--text);border-color:var(--faint)}
  .langsel:focus{outline:none;border-color:var(--faint)}
  /* visible keyboard focus (WCAG 2.4.7) — keyboard only, never on mouse click */
  .btn:focus-visible,.langsel:focus-visible{outline:2px solid var(--text);outline-offset:2px}

  /* ── the board: one process = one card, fixed slot, never reordered.
        a card appears when its process starts and is removed only when the
        process ends (SessionEnd) or times out. nothing here is dismissable. ── */
  /* one full-width row per process, stacked top→bottom; the board scrolls when
     there are many. render() floats the alerting tiers (stuck, needs-you) to the
     top, so what needs you is always on the first screen — no scrolling to find it. */
  .board{flex:1;min-height:0;margin-top:20px;display:flex;flex-direction:column;
    gap:10px;overflow-y:auto;overflow-x:hidden;
    scrollbar-width:thin;scrollbar-color:var(--hairline) transparent}
  .board::-webkit-scrollbar{width:10px}
  .board::-webkit-scrollbar-thumb{background:var(--hairline);border-radius:8px;
    border:3px solid transparent;background-clip:content-box}
  .board::-webkit-scrollbar-track{background:transparent}

  /* SIZE BY URGENCY: calm rows (working/done/idle) are compact so the whole floor
     fits a glance; the few that NEED YOU grow and show their full message (below).
     flex:0 0 auto = each row is exactly its content height — never squeezed, so a
     message can't clip. */
  .card{position:relative;flex:0 0 auto;border:1px solid var(--hairline);border-radius:8px;
    background:var(--surface);background:color-mix(in srgb,var(--tc) 9%,var(--surface));
    padding:11px 24px;display:flex;flex-direction:column;gap:4px;overflow:hidden;
    box-shadow:0 16px 36px -34px rgba(0,0,0,.9);
    transition:background-color .4s var(--ease),border-color .4s var(--ease),padding .3s var(--ease)}
  .card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:7px;background:var(--tc);
    transition:background-color .4s var(--ease)}
  .card[data-state="working"]{--tc:var(--c-working)}
  .card[data-state="waiting"]{--tc:var(--c-waiting)}
  .card[data-state="done"]   {--tc:var(--c-done)}
  .card[data-state="error"]  {--tc:var(--c-error)}
  .card[data-state="idle"]   {--tc:#7e8794}   /* lighter slate so the IDLE chip text clears WCAG AA on the card surface (var(--c-idle) was ~1.3:1) */

  /* a faint state glyph — a redundant, colour-blind-safe channel readable as a
     silhouette at distance even when the hue is hard to resolve */
  .glyph{position:absolute;top:50%;right:24px;transform:translateY(-50%);
    font-family:var(--sans);font-weight:700;line-height:1;
    font-size:clamp(1.7rem,3.4vw,2.5rem);color:var(--tc);opacity:.20;pointer-events:none}
  @media (prefers-contrast:more){ .card .glyph{opacity:.6} }   /* readable for high-contrast users; the state word is the primary signal */

  /* ── ACROSS-THE-ROOM: calm states stay quiet; the two that NEED YOU go LOUD.
     loudness (luminance + area + motion), not hue, carries across a room and
     survives colour-blindness — so the urgent tiles flood with bright colour,
     show a bold glyph, and pulse, while working/done/idle stay tasteful. ── */
  .card[data-state="waiting"],
  .card[data-state="error"]{ border-color:transparent; color:var(--ink) }
  .card[data-state="waiting"]::before,
  .card[data-state="error"]::before{ opacity:0 }            /* edge bar redundant once flooded */
  .card[data-state="waiting"]{
    background:var(--c-waiting); --ink:#1b1304; --ink-soft:rgba(27,19,4,.66);
  }
  .card[data-state="error"]{
    background:var(--c-error); --ink:#fff4f3; --ink-soft:rgba(255,244,243,.74);
  }
  /* only the single most-urgent card pulses — many pulsing blocks read as noise.
     render() tags it .lead; the others stay flooded-bright but still. */
  .card.lead[data-state="waiting"]{ animation:cardBeat 1.6s ease-in-out infinite }
  .card.lead[data-state="error"]{ animation:cardBeat .9s ease-in-out infinite }

  /* the urgent tiers grow back up: bigger title + glyph, and the message wraps to
     its FULL text (calm rows truncate to one line; an alert never should). */
  .card[data-state="waiting"],.card[data-state="error"]{ padding:20px 26px;gap:11px }
  .card[data-state="waiting"] .title,.card[data-state="error"] .title{ font-size:clamp(1.7rem,4.4vw,2.9rem) }
  .card[data-state="waiting"] .glyph,.card[data-state="error"] .glyph{ font-size:clamp(2.8rem,6vw,4.4rem) }
  .card[data-state="waiting"] .action,.card[data-state="error"] .action{
    white-space:normal;overflow:visible;text-overflow:clip;color:var(--ink);
    background:rgba(0,0,0,.12);border-left:3px solid var(--ink);border-radius:0 6px 6px 0;
    font-size:clamp(1rem,1.7vw,1.25rem);line-height:1.4;padding:12px 16px }
  .card[data-state="waiting"] .chip, .card[data-state="error"] .chip,
  .card[data-state="waiting"] .title, .card[data-state="error"] .title,
  .card[data-state="waiting"] .glyph, .card[data-state="error"] .glyph{ color:var(--ink) }
  .card[data-state="waiting"] .glyph, .card[data-state="error"] .glyph{ opacity:.92 }
  .card[data-state="waiting"] .chip .dot, .card[data-state="error"] .chip .dot{ background:var(--ink) }
  .card[data-state="waiting"] .ago, .card[data-state="error"] .ago,
  .card[data-state="waiting"] .subs, .card[data-state="error"] .subs{ color:var(--ink-soft) }
  .card[data-state="waiting"] .badge, .card[data-state="error"] .badge{
    color:var(--ink); border-color:var(--ink-soft) }
  @keyframes cardBeat{ 0%,100%{ filter:brightness(1) } 50%{ filter:brightness(1.13) } }

  /* ── completion reward (strong) ─────────────────────────────────────────────
     When a card transitions to READY (the real Stop/done hook event — the same
     signal that fires the chime, nothing is clicked), play a one-time turn-complete
     burst: the card flashes bright with a double-pulse + a small physical pop, a
     green ring flashes around the inside edge, the ✓ snaps in BIG with a green
     glow then settles, and a bright sweep crosses. ~0.7s, never loops, fully
     contained (inset ring → never clipped by the scroll container). */
  .card.celebrate{animation:cardCele .7s var(--ease), ringFlash .7s var(--ease)}
  @keyframes cardCele{
    0%{ transform:scale(.99); filter:brightness(.86) }
    18%{ transform:scale(1.022); filter:brightness(1.85) }
    40%{ transform:scale(1.004); filter:brightness(1.05) }
    56%{ filter:brightness(1.25) }
    100%{ transform:scale(1); filter:brightness(1) } }
  @keyframes ringFlash{
    0%{ box-shadow:0 16px 36px -34px rgba(0,0,0,.9), inset 0 0 0 0 rgba(58,168,107,0) }
    20%{ box-shadow:0 16px 36px -34px rgba(0,0,0,.9), inset 0 0 0 3px rgba(58,168,107,.95), inset 0 0 28px rgba(58,168,107,.42) }
    100%{ box-shadow:0 16px 36px -34px rgba(0,0,0,.9), inset 0 0 0 0 rgba(58,168,107,0) } }
  .card.celebrate .glyph{animation:checkPop .7s var(--ease)}
  @keyframes checkPop{
    0%{ transform:translateY(-50%) scale(.25); opacity:0; filter:none }
    38%{ transform:translateY(-50%) scale(1.8); opacity:1; filter:drop-shadow(0 0 13px rgba(58,168,107,.9)) }
    62%{ transform:translateY(-50%) scale(1.07); opacity:.92; filter:drop-shadow(0 0 5px rgba(58,168,107,.5)) }
    100%{ transform:translateY(-50%) scale(1); opacity:.2; filter:none } }
  .card.celebrate::after{content:"";position:absolute;inset:0;pointer-events:none;border-radius:8px;
    background:linear-gradient(100deg,transparent 26%,rgba(255,255,255,.58) 50%,transparent 74%);
    transform:translateX(-130%);animation:cardSweep .68s var(--ease)}
  @keyframes cardSweep{ to{ transform:translateX(130%) } }

  .card-top{display:flex;align-items:center;justify-content:space-between;gap:12px}
  /* state as letters + colour — the traffic-light signal */
  .chip{display:inline-flex;align-items:center;gap:8px;color:var(--tc);font-family:var(--mono);
    font-weight:700;font-size:13px;letter-spacing:.14em;text-transform:uppercase}
  .chip .dot{width:9px;height:9px;border-radius:1px;background:var(--tc)}
  .card[data-state="working"] .chip .dot{animation:breathe 2.4s ease-in-out infinite}
  .card[data-state="waiting"] .chip .dot{animation:blink 1.4s steps(1,end) infinite}
  .card[data-state="error"]   .chip .dot{animation:blink .8s  steps(1,end) infinite}
  @keyframes breathe{0%,100%{opacity:.5}50%{opacity:1}}
  .ago{font-family:var(--mono);font-size:12.5px;color:var(--faint);
    font-variant-numeric:tabular-nums;flex:none}

  /* identity — WHICH process this is (the colour already says the state) */
  .ident{display:flex;align-items:baseline;gap:13px;flex-wrap:wrap;min-width:0}
  .badge{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;
    color:var(--muted);border:1px solid var(--hairline);border-radius:4px;padding:3px 8px;flex:none}
  .title{font-family:var(--sans);font-weight:700;letter-spacing:-.01em;color:var(--text);
    font-size:clamp(1.05rem,2.1vw,1.5rem);line-height:1.04;min-width:0;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .subs{font-family:var(--mono);font-size:12px;letter-spacing:.05em;color:var(--faint);flex:none}
  /* calm message: a thin dim line (no box) so a running row stays low — see the
     alerting override below, where it grows into a boxed, full-text panel. */
  .action{font-family:var(--mono);font-size:clamp(.8rem,1.25vw,.98rem);color:var(--muted);
    padding:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

  /* ── totally idle — no processes at all ── */
  .idle-hero{margin:auto 0;display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:14px;min-height:50vh}
  .idle-hero .big{font-family:var(--sans);font-weight:700;color:var(--c-idle);
    font-size:clamp(3rem,11vw,7.5rem);line-height:.9}
  .idle-hero .cn{color:var(--muted);font-size:clamp(1rem,2.4vw,1.5rem)}
  .idle-hero .sub{font-family:var(--mono);font-size:12.5px;letter-spacing:.05em;color:var(--faint)}

  /* ── header leverage badge: a whisper-quiet, leverage-only ambient cue. It is
     deliberately faint and small so it can never become a second attention magnet
     competing with the signal bar (hidden on phones, where the header is tight). */
  .lvbadge{font-family:var(--mono);font-size:12px;letter-spacing:.04em;color:var(--faint);white-space:nowrap}
  .lvbadge b{color:var(--muted);font-weight:600;font-variant-numeric:tabular-nums}
  .lvbadge .lvb-k{color:var(--faint);letter-spacing:.16em;margin-right:7px}

  /* ── idle "today" leverage panel: the reward-when-calm surface, shown ONLY when
     the board is empty AND something ran today. Numbers count up once on appear
     then FREEZE (an earned reveal, not a live ticker). Honest labels; the
     attention cell is amber (the cost), everything else stays calm (the gain). */
  .lvhero{margin:auto 0;width:100%;max-width:920px;align-self:center;
    display:flex;flex-direction:column;gap:24px;padding:0 8px;animation:lvFade .5s var(--ease)}
  @keyframes lvFade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .lvh-today{font-family:var(--mono);font-size:13px;letter-spacing:.3em;color:var(--faint);
    text-transform:uppercase;text-align:center}
  .lvh-row{display:flex;gap:18px;flex-wrap:wrap;justify-content:center}
  .lvh-big{flex:1;min-width:240px;border:1px solid var(--hairline);border-radius:12px;
    background:color-mix(in srgb,var(--c-done) 6%,var(--surface));padding:22px 26px}
  .lvh-n{font-family:var(--mono);font-weight:700;font-variant-numeric:tabular-nums;color:var(--text);
    font-size:clamp(2.4rem,6.5vw,4.2rem);line-height:1}
  .lvh-l{margin-top:10px;font-family:var(--mono);font-size:13px;color:var(--muted);letter-spacing:.02em}
  .lvh-l b{color:var(--c-done);font-weight:600}
  .lvh-cells{display:flex;gap:14px;flex-wrap:wrap;justify-content:center}
  .lvh-cell{flex:1;min-width:150px;border:1px solid var(--hairline);border-radius:10px;
    background:var(--surface);padding:15px 18px;text-align:center}
  .lvh-cn{font-family:var(--mono);font-weight:700;font-variant-numeric:tabular-nums;color:var(--text);
    font-size:clamp(1.6rem,4vw,2.2rem)}
  .lvh-cl{margin-top:5px;font-family:var(--mono);font-size:12.5px;color:var(--faint);letter-spacing:.03em}
  .lvh-cell.cost{background:color-mix(in srgb,var(--c-waiting) 7%,var(--surface));border-color:transparent}
  .lvh-cell.cost .lvh-cn{color:var(--c-waiting)}
  .lvh-nudge{text-align:center;font-family:var(--mono);font-size:14.5px;color:var(--muted);letter-spacing:.02em}
  .lvh-nudge::before{content:"› ";color:var(--c-done)}
  .lvhero .sub{text-align:center;font-family:var(--mono);font-size:12px;letter-spacing:.05em;color:var(--faint)}

  @media (prefers-reduced-motion:reduce){
    .andon-dot,.chip .dot,.andon,.card,.card .glyph{animation:none!important}
    .card.celebrate::after{animation:none!important;opacity:0}
  }

  /* ── narrow screens (phone portrait) ──────────────────────────────────────
     The board is built for a wide wall iPad; on a phone the header and signal
     bar must shrink/wrap rather than overflow off the right edge. */
  @media (max-width:600px){
    .app{padding:58px 14px 18px}
    .andon{padding:0 14px;gap:10px}
    .andon-cn{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .andon-tally{display:none}            /* the overflow culprit, and redundant with the cards */
    .head{flex-wrap:nowrap;gap:11px;min-width:0}      /* one row, always */
    .head .rule{display:none}
    #headLabel, .clock, .conn .conn-txt, .lvbadge{display:none} /* keep only the dot + lang + sound */
    .brand{letter-spacing:.18em;flex:none}
    .langsel{padding:6px 24px 6px 10px;font-size:12px;min-width:0}
    .btn{padding:6px 10px;font-size:11px}
    .btn.sound{padding:6px 9px;flex:none}
    .btn.sound .slbl{display:none}                    /* swap the localized label … */
    .btn.sound .sico{display:inline-flex}             /* … for a language-neutral icon */
  }
</style>
</head>
<body data-dominant="idle">
  <div class="grid"></div>

  <div class="andon" id="andon">
    <span class="andon-dot" aria-hidden="true"></span>
    <span class="andon-word" id="andonWord" aria-live="polite" aria-atomic="true">IDLE</span>
    <span class="andon-cn" id="andonCn">空闲</span>
    <span class="andon-tally" id="andonTally"></span>
  </div>

  <div class="app">
    <div class="head" role="banner">
      <span class="brand">ANDON</span>
      <span id="headLabel">agent status</span>
      <span class="lvbadge" id="lvBadge" style="display:none"></span>
      <span class="rule"></span>
      <span class="conn" id="conn"><span class="led"></span><span class="conn-txt">live</span></span>
      <span class="clock" id="clock">--:--</span>

const LOCALES = ["en","zh","ja","ko","es","de","fr"];
const LANG_NAME = {en:"English", zh:"中文", ja:"日本語", ko:"한국어", es:"Español", de:"Deutsch", fr:"Français"};
function resolveLang(){
  const q = new URLSearchParams(location.search).get("lang");
  if (q && STR[q]) return q;
  let saved=null; try { saved = localStorage.getItem("andon.lang"); } catch(e){}
  if (saved && STR[saved]) return saved;
  const n = (navigator.language || "en").toLowerCase().slice(0, 2);
  return STR[n] ? n : "en";
}
let LANG = resolveLang();
const S = () => STR[LANG] || STR.en;

/* A process whose foreground stopped (done) but still has background tasks is
   NOT done — it reads as still running. Attention states are never masked. */
function viewState(s){
  return (s.state === "done" && (s.pending|0) > 0) ? "working" : s.state;
}
const AGENTS = {claude:"CLAUDE CODE", codex:"CODEX"};
/* a distinct silhouette per state — readable at distance / colour-blind-safe */
const GLYPH  = {working:"↻", waiting:"!", done:"✓", error:"✕", idle:"·"};

const board   = document.getElementById("board");
const conn    = document.getElementById("conn");
const connTxt = conn.querySelector(".conn-txt");

const soundBtn= document.getElementById("soundBtn");

// populate the language picker once — a native <select> scales to any number of
// languages (the OS shows a scrollable picker on the iPad), unlike a cycle button.
for (const code of LOCALES){
  const o = document.createElement("option");
  o.value = code; o.textContent = LANG_NAME[code] || code;
  langSel.appendChild(o);
}
const andonWord  = document.getElementById("andonWord");
const andonCn    = document.getElementById("andonCn");
const andonTally = document.getElementById("andonTally");

let last  = {sessions:[], server_time:0};
let skew  = 0;                     // server_time - local time, for live "ago"
let order = [];                    // stable card order (first-seen wins; never reshuffled)
const cards = new Map();           // id -> card element (reused in place)
const celebrateTimers = new Map(); // id -> pending "remove .celebrate" timeout
let prevState = {};
let primed = false;
let connOk = true;                 // last connection state, for re-rendering on language change

const DONE_GRACE_MS = 4000;   // a "done" must persist this long before it goes green
const doneSince = new Map();  // id -> serverTime(ms) it first read done (debounce)
let graceTimer = null;

const nowSec = () => Date.now()/1000;
const serverNow = () => nowSec() + skew;
const agentLabel = a => AGENTS[a] || (a || "AGENT").toUpperCase();
function ago(sec){ return S().ago(Math.max(0, Math.round(sec))); }

/* debounced display state: a transient "done" (a turn briefly ends, or hook
   events arrive slightly out of order) is held as "working" until it stays done
   for the grace window — so a flicker never flashes green or pulls you back.
   urgent states (waiting/stuck) are never delayed. */
function dispState(s){
  const raw = viewState(s);
  if (raw !== "done"){ doneSince.delete(s.id); return raw; }
  const tnow = serverNow() * 1000;
  if (!doneSince.has(s.id)) doneSince.set(s.id, tnow);
  return (tnow - doneSince.get(s.id) >= DONE_GRACE_MS) ? "done" : "working";
}

/* ---------- the andon bar: one headline answering "does anything need me?" ---------- */
function counts(list){
  const c = {};
  for (const s of list){ const v = dispState(s); c[v] = (c[v] || 0) + 1; }
  return c;
}
function tally(c){
  const T = S().tally;
  const parts = [];
  for (const k of ["error","waiting","done","working","idle"])
    if (c[k]) parts.push(c[k] + " " + T[k]);
  return parts.join("   ·   ");
}
function setBar(list){
  const c = counts(list);
  const need = (c.error || 0) + (c.waiting || 0);
  const B = S().bar;
  let dom, pair;
  if (c.error)        { dom="error";   pair=B.error(need); }
  else if (c.waiting) { dom="waiting"; pair=B.waiting(need); }
  else if (c.working) { dom="working"; pair=B.working(); }
  else if (c.done)    { dom="done";    pair=B.done(); }
  else                { dom="idle";    pair=B.idle(); }
  document.body.dataset.dominant = dom;
  andonWord.textContent  = pair[0];
  andonCn.textContent    = pair[1];
  andonTally.textContent = list.length ? tally(c) : S().none;
}

/* ---------- cards (created once per process, then updated in place) ---------- */
function makeCard(){
  const el = document.createElement("div");
  el.className = "card";
  el.setAttribute("role", "listitem"); // each agent is an item in the board's list (a11y)
  el.innerHTML =
    '<span class="glyph"></span>' +
    '<div class="card-top"><span class="chip"><span class="dot"></span>' +
      '<span class="cw"></span></span><span class="ago"></span></div>' +
    '<div class="ident"><span class="badge"></span><span class="title"></span><span class="subs"></span></div>' +
    '<div class="action"></div>';
  return el;
}
function updateCard(el, s, t){
  const vs = dispState(s);
  if (el.dataset.state !== vs) el.dataset.state = vs;   // only this restarts the blink
  el.querySelector(".cw").textContent = S().chip[vs] || vs.toUpperCase();
  el.querySelector(".glyph").textContent   = GLYPH[vs] || "";
  el.querySelector(".badge").textContent   = agentLabel(s.agent);
  el.querySelector(".title").textContent   = s.title || "—";
  const subs = el.querySelector(".subs");
  const n = s.pending | 0;
  subs.textContent = n > 0 ? S().bg(n) : "";
  subs.style.display = n > 0 ? "" : "none";
  const act = el.querySelector(".action");
  act.textContent = s.message || "";
  act.style.display = s.message ? "" : "none";
  el.dataset.updated = s.updated_at;
  el.querySelector(".ago").textContent = ago(t - s.updated_at);
}

/* keep each process in its original slot; append newcomers, drop the departed */
function reorder(list){
  const ids = new Set(list.map(s => s.id));
  order = order.filter(id => ids.has(id));
  for (const s of list) if (!order.includes(s.id)) order.push(s.id);
  return order;
}

/* ---------- render (in place — positions and animations stay stable) ---------- */
/* ---------- the honest "today" leverage/attention surfaces (badge + idle panel) ---------- */
function fmtDur(sec){
  sec = Math.max(0, Math.round(sec));
  const h = Math.floor(sec/3600), m = Math.floor((sec%3600)/60);
  if (h > 0) return h + "h " + m + "m";
  if (m > 0) return m + "m";
  return sec + "s";
}
/* count a number up once on appearance, then freeze on the exact value — an
   earned reveal at the calm return moment, NOT a live ticker (see the guardrail). */
function countUp(el, target, fmt, dur){
  if (!el) return;
  dur = dur || 850;
  const t0 = performance.now();
  (function step(t){
    const p = Math.min(1, (t - t0) / dur);
    el.textContent = fmt(target * (1 - Math.pow(1 - p, 3)));   // easeOutCubic
    if (p < 1) requestAnimationFrame(step); else el.textContent = fmt(target);
  })(t0);
}
/* the whisper-quiet always-on header cue: leverage only, no attention stat */
function updateBadge(){
  if (!lvBadge) return;
  const td = last.today;

    lvBadge.style.display = "";
  } else lvBadge.style.display = "none";
}

  return '<div class="lvhero" role="group" aria-label="' + L.today + '"><div class="lvh-today">' + L.today + '</div>' +

    '</div>' +
    '<div class="lvh-cells">' +

      cell('cuPulled', L.pulledIn + stuckTxt, true) +

    '<div class="lvh-nudge">' + L.nudge + '</div>' +

function animateHero(td){
  countUp(document.getElementById("cuHands"), td.hands_off_sec, fmtDur);
  countUp(document.getElementById("cuHours"), td.agent_sec/3600, v => v.toFixed(1));
  countUp(document.getElementById("cuAgents"), td.agents, v => String(Math.round(v)));
  countUp(document.getElementById("cuPulled"), td.pulled_in, v => String(Math.round(v)));
  countUp(document.getElementById("cuPeak"), td.peak, v => String(Math.round(v)));
}

function render(){
  const list = last.sessions || [];
  const t = serverNow();
  setBar(list);
  updateBadge();

  // chime on a transition into needs-you / stuck / done (skip the first render);
  // collect the cards that just turned READY so they get the completion flourish
  let chime = null;
  const justDone = [];
  if (primed){
    for (const s of list){
      const vs = dispState(s);
      if (prevState[s.id] !== vs &&
          (vs==="waiting" || vs==="error" || vs==="done")){
        if (chime===null || PRI[vs] < PRI[chime]) chime = vs;
        if (vs==="done") justDone.push(s.id);
      }
    }
  }
  prevState = {};
  for (const s of list) prevState[s.id] = dispState(s);
  primed = true;

  // drop cards whose process is gone
  const ids = new Set(list.map(s => s.id));
  for (const [id, el] of [...cards]) if (!ids.has(id)){ el.remove(); cards.delete(id); doneSince.delete(id);
    clearTimeout(celebrateTimers.get(id)); celebrateTimers.delete(id); }

  if (list.length === 0){
    order = [];
    const td = last.today;
    const wantHero = !!(td && td.agents > 0);
    // Build the panel ONLY when the kind we want isn't already on screen — so it
    // counts up once (not every render), yet still upgrades plain-IDLE → leverage
    // panel if today's data arrives on a later render (e.g. after a server start
    // or a midnight reset), and downgrades back at midnight.
    if (wantHero && !board.querySelector(".lvhero")){
      board.innerHTML = leverageHeroHTML(td);   // reward-when-calm: counted up once, then frozen
      animateHero(td);
    } else if (!wantHero && !board.querySelector(".idle-hero")){
      const e = S().empty;
      board.innerHTML =
        '<div class="idle-hero"><div class="big">' + e.big + '</div>' +
        '<div class="sub">' + e.sub + '</div></div>';
    }
    return;
  }
  const hero = board.querySelector(".idle-hero, .lvhero");
  if (hero) hero.remove();

  const byId = new Map(list.map(s => [s.id, s]));
  // stable launch order, then float the alerting tiers to the top so whatever
  // needs you is always on the first screen: stuck first, needs-you next, the
  // rest in their original slot. A tile only jumps when it crosses the
  // urgent⇄calm line — no constant reshuffling while you read.
  const tier = id => { const s = byId.get(id); const vs = s ? dispState(s) : "idle";
    return vs === "error" ? 0 : vs === "waiting" ? 1 : 2; };
  const ordered = reorder(list).slice().sort((a, b) => tier(a) - tier(b)); // stable sort keeps slots within a tier
  const leadId = ordered.find(id => tier(id) < 2) || null; // the one alerting card that pulses
  let prevEl = null;
  for (const id of ordered){
    const s = byId.get(id);
    if (!s) continue;
    let el = cards.get(id);
    if (!el){ el = makeCard(); cards.set(id, el); }
    updateCard(el, s, t);
    el.classList.toggle("lead", id === leadId);
    // Move in the DOM ONLY when the slot actually changed. Re-inserting a node
    // restarts its CSS animations, so an unconditional appendChild would stutter
    // the breathing dot / lead pulse on every SSE push from any agent. This
    // insertBefore is a true no-op when el is already in its target slot.
    const ref = prevEl ? prevEl.nextSibling : board.firstChild;
    if (el !== ref) board.insertBefore(el, ref);
    prevEl = el;
  }

  // fire the one-time turn-complete flourish on cards that just turned READY. Applied
  // after placement (so a tier move can't restart it); remove+reflow+add restarts
  // the animation cleanly if the same card celebrates again later.
  for (const id of justDone){
    const el = cards.get(id);
    if (!el) continue;
    clearTimeout(celebrateTimers.get(id));   // cancel a still-pending removal so a re-trigger isn't cut short
    el.classList.remove("celebrate");
    void el.offsetWidth;
    el.classList.add("celebrate");
    celebrateTimers.set(id, setTimeout(() => { el.classList.remove("celebrate"); celebrateTimers.delete(id); }, 780));
  }

  // SSE won't push during a grace wait — re-render when the soonest one matures,
  // so a session that genuinely stays done turns green a few seconds later.
  if (graceTimer){ clearTimeout(graceTimer); graceTimer = null; }
  let soonest = Infinity;
  for (const s of list){
    if (viewState(s) === "done" && doneSince.has(s.id)){
      const rem = DONE_GRACE_MS - (serverNow()*1000 - doneSince.get(s.id));
      if (rem > 0 && rem < soonest) soonest = rem;
    }
  }
  if (soonest !== Infinity) graceTimer = setTimeout(render, Math.max(250, soonest + 50));

  if (chime) playChime(chime);
  // a fresh stuck/needs-you just floated to the top — bring it into view so the
  // user never has to scroll to find what's calling them.
  if (chime === "error" || chime === "waiting"){
    const smooth = !matchMedia("(prefers-reduced-motion: reduce)").matches; // don't disorient vestibular users
    board.scrollTo({top:0, behavior: smooth ? "smooth" : "auto"});
  }
}

const withToken = (path) => TOKEN ? path + (path.includes("?") ? "&" : "?") + "token=" + encodeURIComponent(TOKEN) : path;

function startStream(){
  if (!("EventSource" in window)) return startPoll();
  let es;

  catch (e){ return startPoll(); }
  es.onopen    = () => setConn(true);

}

    if (!r.ok) throw new Error("bad status");

}

/* ---------- hosted transport: relay SSE + client-side decrypt (same render) ---------- */
const IDB_DB = "andon-hosted", IDB_STORE = "kv";
function idbGet(k){
  return new Promise((res) => {
    let req; try { req = indexedDB.open(IDB_DB, 1); } catch (e){ return res(null); }
    req.onupgradeneeded = () => { try { req.result.createObjectStore(IDB_STORE); } catch(e){} };
    req.onsuccess = () => { try { const g = req.result.transaction(IDB_STORE,"readonly").objectStore(IDB_STORE).get(k); g.onsuccess = () => res(g.result); g.onerror = () => res(null); } catch(e){ res(null); } };
    req.onerror = () => res(null);
  });
}
function idbSet(items){
  return new Promise((res) => {
    let req; try { req = indexedDB.open(IDB_DB, 1); } catch (e){ return res(); }
    req.onupgradeneeded = () => { try { req.result.createObjectStore(IDB_STORE); } catch(e){} };
    req.onsuccess = () => { try { const tx = req.result.transaction(IDB_STORE,"readwrite"); const os = tx.objectStore(IDB_STORE); for (const k in items) os.put(items[k], k); tx.oncomplete = () => res(); tx.onerror = () => res(); } catch(e){ res(); } };
    req.onerror = () => res();
  });
}
/* decrypt one sealed event — mirrors src/hosted/e2e.ts open() */
async function openSealed(key, boardId, ev){
  const aad = new TextEncoder().encode(JSON.stringify([boardId, ev.sid, ev.state, ev.seq]));
  const ptBuf = await crypto.subtle.decrypt({ name:"AES-GCM", iv: b64uToU8(ev.enc.nonce), additionalData: aad, tagLength:128 }, key, b64uToU8(ev.enc.ct));
  const pt = new Uint8Array(ptBuf);
  if (pt.length < 4) throw new Error("short");
  const len = (pt[0] | (pt[1]<<8) | (pt[2]<<16) | (pt[3]<<24)) >>> 0; // unsigned, matches node readUInt32LE
  if (len + 4 > pt.length) throw new Error("bad length");
  const o = JSON.parse(new TextDecoder().decode(pt.subarray(4, 4 + len)));
  if (o.seq !== ev.seq) throw new Error("seq");
  return o;
}
/* No key on THIS device (a returning visit / new device / cleared storage; a PWA
   launch has #k stripped, so the key must come from IndexedDB). The relay is fine —
   you just need to re-open your board link. A distinct state, NOT "offline". */
function showRepair(){
  const r = S().repair || STR.en.repair;
  connOk = false; conn.classList.add("off"); connTxt.textContent = S().recon;
  document.body.dataset.dominant = "offline";
  andonWord.textContent = r.big; andonCn.textContent = ""; andonTally.textContent = r.sub;
  board.innerHTML = '<div class="idle-hero"><div class="big">' + r.big + '</div><div class="sub">' + r.sub + '</div></div>';
}
async function startHosted(){
  let rawKey = null;
  try { rawKey = HKEY_B64 ? b64uToU8(HKEY_B64) : await idbGet("key:" + BOARD_ID); } catch (e) { rawKey = null; } // malformed #k → re-pair, not a dead board
  if (!rawKey){ showRepair(); return; }
  const slots = {}; slots["key:" + BOARD_ID] = rawKey; slots["boardUrl:" + BOARD_ID] = location.origin + "/b/" + encodeURIComponent(BOARD_ID);
  await idbSet(slots); // per-board slots so two boards on one origin can't cross keys (push SW + reloads)
  let key; try { key = await crypto.subtle.importKey("raw", rawKey, "AES-GCM", false, ["decrypt"]); } catch(e){ setConn(false); return; }
  const sessions = new Map(), lastSeq = new Map();
  const ingestEv = async (ev) => {
    const prev = lastSeq.get(ev.sid);
    if (prev !== undefined && ev.seq <= prev) return; // freshness guard: the relay can't replay a stale state
    try {
      const o = await openSealed(key, BOARD_ID, ev);
      lastSeq.set(ev.sid, ev.seq);
      sessions.set(ev.sid, { id: ev.sid, agent: o.agent || "", state: ev.state, title: o.title || "", message: o.message || "", pending: o.pending || 0, updated_at: Math.floor((o.tsClient || nowSec()*1000)/1000) });
    } catch(e){ /* wrong key / tamper → skip this event */ }
  };
  const draw = () => apply({ sessions: [...sessions.values()], server_time: nowSec() });
  let es; try { es = new EventSource("/e/" + encodeURIComponent(BOARD_ID)); } catch(e){ setConn(false); return; }
  es.onopen  = () => setConn(true);
  es.onmessage = async (e) => {
    try { const m = JSON.parse(e.data);
      if (m.type === "snapshot"){ sessions.clear(); lastSeq.clear(); for (const ev of m.events) await ingestEv(ev); draw(); }
      else if (m.type === "event"){ await ingestEv(m.event); draw(); }
    } catch(_){}
  };
  es.onerror = () => setConn(false);
}

  langSel.value = LANG;
  headLabel.textContent = S().head;
  reflectSound();
  render();
  setConn(connOk);
}
langSel.addEventListener("change", () => {
  LANG = STR[langSel.value] ? langSel.value : "en";
  try { localStorage.setItem("andon.lang", LANG); } catch (e){}
  applyLang();
});
soundBtn.addEventListener("click", () => {
  soundOn = !soundOn;
  try { localStorage.setItem("andon.alerts", soundOn ? "on" : "off"); } catch (e){}
  if (soundOn){
    armAudio();                          // create + unlock both paths SYNCHRONOUSLY in the tap
    if (actx){ tone(880, 0, .12, .10); unlockEl(aEl.done); } // WebAudio confirm + unlock the fallback's confirm element too
    else playEl("done");                                     // no WebAudio (iOS audio:none) → <audio> chime (also unlocks it)
    pushSubscribe();                     // …and, where supported, subscribe phone push (asks permission)
    setTimeout(() => diag("audio:" + (actx ? actx.state : "none") + " · el:" + (aReady ? "ok" : "no") + " · std:" + (navigator.standalone ? "yes" : "no") + (aErr ? " · err:" + aErr : "") + " · " + BUILD), 250);
  } else {
    pushUnsubscribe();                   // alerts off → stop phone pushes to this device too
  }
  reflectSound();
});

// honor a remembered "on": browsers LOCK WebAudio on every fresh load until a
// user gesture — a saved preference can't bypass that, so a reloaded page can't
// ring on its own. We show the saved state and re-arm WebAudio on the first
// interaction of ANY kind, and keep listening until the context is actually
// running (one Safari pointerdown doesn't always unlock it) — so after the
// one-time setup tap, the chime survives every reload, and the very first touch
// anywhere brings it back without hunting for the button.
reflectSound();
if (soundOn){
  const GEST = ["pointerdown", "touchend", "click", "keydown"];
  const rearm = () => {
    armAudio();
    unlockEl(aEl.done);                  // no audible confirm on a reload — unlock the confirm element too
    if ((actx && actx.state === "running") || aReady)
      for (const ev of GEST) window.removeEventListener(ev, rearm);
  };
  for (const ev of GEST) window.addEventListener(ev, rearm);
}

/* ---------- the push half of "alerts": phone notifications (Web Push) -----------
   Driven by the single alerts button above. Phone push only works in a secure
   context with the Push API (an installed PWA over HTTPS, e.g. via Tailscale); on
   a plain desktop/iPad tab PUSH_OK is false and the button is chime-only. When it
   works, the server pushes "needs you / stuck" even with the board closed and the
   phone locked — and the payload is encrypted end-to-end by the push spec. */
const PUSH_OK = "serviceWorker" in navigator && "PushManager" in window &&
                "Notification" in window && window.isSecureContext;
const pushTok = () => { try { return new URLSearchParams(location.search).get("token") || ""; } catch (e){ return ""; } };
const pushUrl = (p) => { const t = pushTok(); return t ? p + (p.indexOf("?") < 0 ? "?" : "&") + "token=" + encodeURIComponent(t) : p; };
/* hosted talks to the relay's endpoints; self-host to /push/* on its own server */
const EP_VAPID = HOSTED ? "/vapid" : pushUrl("/push/vapid");
const EP_SUB   = HOSTED ? ("/p/" + encodeURIComponent(BOARD_ID) + "/subscribe")   : pushUrl("/push/subscribe");
const EP_UNSUB = HOSTED ? ("/p/" + encodeURIComponent(BOARD_ID) + "/unsubscribe") : pushUrl("/push/unsubscribe");
function b64uToU8(s){
  const pad = "=".repeat((4 - (s.length % 4)) % 4);
  const raw = atob((s + pad).replace(/-/g, "+").replace(/_/g, "/"));
  const u = new Uint8Array(raw.length);
  for (let i = 0; i < raw.length; i++) u[i] = raw.charCodeAt(i);
  return u;
}
async function postSub(sub){
  try { await fetch(EP_SUB, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(sub) }); } catch (e){}
}
/* subscribe this device to phone push — prompts for notification permission the
   first time (the merged alerts tap is the gesture). Best-effort: if the device
   can't push or permission is denied, the chime alone still works. */
async function pushSubscribe(){
  if (!PUSH_OK) return;
  try {
    if (await Notification.requestPermission() !== "granted") return;
    const reg = await navigator.serviceWorker.register("/sw.js");
    let sub = await reg.pushManager.getSubscription();
    if (!sub){
      const { publicKey } = await (await fetch(EP_VAPID)).json();
      sub = await reg.pushManager.subscribe({ userVisibleOnly: true, applicationServerKey: b64uToU8(publicKey) });
    }
    await postSub(sub);
  } catch (e){}
}
/* alerts turned off → stop phone pushes to this device too. */
async function pushUnsubscribe(){
  if (!PUSH_OK) return;
  try {
    const reg = await navigator.serviceWorker.getRegistration();
    const sub = reg && (await reg.pushManager.getSubscription());
    if (sub){
      const ep = sub.endpoint;
      await sub.unsubscribe();
      try { await fetch(EP_UNSUB, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ endpoint: ep }) }); } catch (e){}
    }
  } catch (e){}
}
/* keep the server's in-memory subscription fresh (it restarted / you came back)
   without re-prompting — only when alerts are on and permission already granted. */
async function pushEnsure(){
  if (!PUSH_OK || !soundOn || Notification.permission !== "granted") return;
  try {
    const reg = await navigator.serviceWorker.register("/sw.js");
    const sub = await reg.pushManager.getSubscription();
    if (sub) postSub(sub);
  } catch (e){}
}
pushEnsure();
document.addEventListener("visibilitychange", () => { if (!document.hidden) pushEnsure(); });

/* ---------- keep the iPad awake (iPadOS 16.4+) ---------- */
let wakeLock = null;
async function reqWake(){
  try { if ("wakeLock" in navigator) wakeLock = await navigator.wakeLock.request("screen"); }
  catch (e){ /* if unsupported: set Auto-Lock → Never in iPad settings */ }
}
document.addEventListener("visibilitychange", () => {
  if (document.visibilityState === "visible"){
    reqWake();
    // a wall iPad suspends WebAudio on sleep — wake it so chimes keep working
    if (soundOn && actx && actx.state === "suspended") actx.resume();
  }
});

/* ---------- boot ---------- */
function tick(){ clock.textContent = new Date().toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"}); }
applyLang();   // resolve locale, paint chrome in it, and do the first render
tick(); setInterval(tick, 1000);
setInterval(tickAgos, 1000);
reqWake();
if (HOSTED) startHosted(); else startStream();
</script>
</body>
</html>
